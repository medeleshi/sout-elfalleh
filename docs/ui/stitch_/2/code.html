<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&amp;family=Be+Vietnam+Pro:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-low": "#f5f3ee",
              "error": "#ba1a1a",
              "surface": "#fbf9f4",
              "on-primary-container": "#9dd090",
              "surface-tint": "#3b6934",
              "on-secondary-fixed": "#131f00",
              "tertiary-container": "#843b00",
              "primary-fixed": "#bcf0ae",
              "primary": "#154212",
              "on-error-container": "#93000a",
              "surface-container-lowest": "#ffffff",
              "inverse-surface": "#30312e",
              "background": "#fbf9f4",
              "tertiary-fixed-dim": "#ffb68d",
              "surface-container-highest": "#e4e2dd",
              "surface-container": "#f0eee9",
              "on-secondary-container": "#4e6e00",
              "on-tertiary-fixed-variant": "#763400",
              "on-background": "#1b1c19",
              "outline-variant": "#c2c9bb",
              "inverse-on-surface": "#f2f1ec",
              "on-tertiary-container": "#ffb184",
              "on-primary": "#ffffff",
              "surface-dim": "#dbdad5",
              "primary-container": "#2d5a27",
              "inverse-primary": "#a1d494",
              "on-secondary": "#ffffff",
              "on-primary-fixed-variant": "#23501e",
              "surface-variant": "#e4e2dd",
              "secondary-fixed": "#c8f17a",
              "surface-container-high": "#eae8e3",
              "surface-bright": "#fbf9f4",
              "on-secondary-fixed-variant": "#364e00",
              "secondary": "#496800",
              "secondary-container": "#c8f17a",
              "tertiary": "#612900",
              "on-primary-fixed": "#002201",
              "error-container": "#ffdad6",
              "on-tertiary-fixed": "#321200",
              "secondary-fixed-dim": "#add461",
              "primary-fixed-dim": "#a1d494",
              "on-tertiary": "#ffffff",
              "outline": "#72796e",
              "on-surface": "#1b1c19",
              "on-error": "#ffffff",
              "tertiary-fixed": "#ffdbc9",
              "on-surface-variant": "#42493e"
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Be Vietnam Pro"],
              "label": ["Be Vietnam Pro"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #fbf9f4;
            font-family: 'Be Vietnam Pro', sans-serif;
            color: #1b1c19;
        }
        h1, h2, h3 {
            font-family: 'Noto Serif', serif;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
<!-- Top Navigation Anchor (Shared Component) -->
<header class="bg-[#fbf9f4] dark:bg-stone-950 transition-colors">
<nav class="flex justify-between items-center w-full px-8 py-4 max-w-7xl mx-auto">
<div class="text-2xl font-bold text-[#154212] dark:text-[#c8f17a]">
                Digital Harvest
            </div>
<div class="flex items-center gap-4">
<button class="p-2 text-[#42493e] dark:text-[#c2c9bb] hover:bg-[#f0eee9] dark:hover:bg-stone-800 transition-all rounded-full">
<span class="material-symbols-outlined" data-icon="help">help</span>
</button>
<button class="p-2 text-[#42493e] dark:text-[#c2c9bb] hover:bg-[#f0eee9] dark:hover:bg-stone-800 transition-all rounded-full">
<span class="material-symbols-outlined" data-icon="language">language</span>
</button>
<div class="w-10 h-10 rounded-full bg-surface-container overflow-hidden">
<img alt="User profile" class="w-full h-full object-cover" data-alt="Close-up portrait of a friendly middle-aged male farmer with warm sunlight lighting one side of his face" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBNXvfrjmLtoIBd0PSVgwcR4zD-fwyvob47ugRPU5MNxAMby984QRomOXi6FT7gbHQXCc-n-9LdeZZNJnxSlRZP5gqt7g647TA9aNeZpHMvPwd3A9PU1mc4rfi-S8KYaDKrszRyn2cNE-4UycfghCn9x_BLdc5fAjZqE2MTtz0_qeGVjfOwuseHQhSIXh2i8RD86R8DZxEZjXBHkfsd5LtVnxv-tEApVaTrjc3p09lyBOHbpt7LV65rXbn_21EGslGiNvzuVRVWYEJr"/>
</div>
</div>
</nav>
</header>
<!-- Main Content: Step 2 Location Form -->
<main class="flex-grow flex items-center justify-center px-6 py-12 md:py-20">
<div class="w-full max-w-2xl bg-surface-container-lowest p-8 md:p-12 rounded-xl shadow-[0px_12px_32px_rgba(27,28,25,0.04)] relative overflow-hidden">
<!-- Background Decorative Element -->
<div class="absolute -top-24 -left-24 w-64 h-64 bg-primary-container/5 rounded-full blur-3xl"></div>
<div class="relative z-10 text-right">
<!-- Step Counter -->
<div class="mb-6 inline-flex items-center px-4 py-1.5 bg-secondary-container text-on-secondary-container rounded-full text-sm font-bold tracking-wide">
                    الخطوة 2 من 5
                </div>
<!-- Headline -->
<h1 class="text-3xl md:text-4xl font-bold text-primary mb-4 leading-tight">أين يتركز نشاطك؟</h1>
<p class="text-on-surface-variant text-lg leading-relaxed mb-10 max-w-lg">
                    يساعدنا تحديد موقعك في تقديم فرص السوق المحلية الأكثر صلة بإنتاجك، وربطك مع المشترين واللوجستيات في منطقتك الجغرافية.
                </p>
<!-- Form Section -->
<form class="space-y-8">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- State / Province -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-on-surface-variant pr-2">الولاية / المحافظة</label>
<div class="relative group">
<select class="w-full appearance-none bg-surface-container-high border-none rounded-xl py-4 px-5 pr-12 focus:ring-2 focus:ring-primary/40 transition-all text-on-surface">
<option disabled="" selected="" value="">اختر الولاية</option>
<option value="1">منطقة العاصمة</option>
<option value="2">المنطقة الشمالية</option>
<option value="3">المنطقة الساحلية</option>
<option value="4">سهول الأراضي الزراعية</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-primary pointer-events-none" data-icon="map">map</span>
</div>
</div>
<!-- Region -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-on-surface-variant pr-2">المنطقة / البلدية</label>
<div class="relative group">
<select class="w-full appearance-none bg-surface-container-high border-none rounded-xl py-4 px-5 pr-12 focus:ring-2 focus:ring-primary/40 transition-all text-on-surface">
<option disabled="" selected="" value="">اختر المنطقة</option>
<option value="1">وادي الزيتون</option>
<option value="2">سهل القمح</option>
<option value="3">المنطقة الحضرية</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-primary pointer-events-none" data-icon="location_on">location_on</span>
</div>
</div>
</div>
<!-- Map Preview / Aesthetic Card -->
<div class="mt-8 rounded-xl overflow-hidden h-48 bg-surface-container border-none relative">
<div class="absolute inset-0 bg-cover bg-center grayscale opacity-60 mix-blend-multiply" data-alt="Minimalist abstract topographical map with clean lines and soft earth tones in a professional modern aesthetic" data-location="Agricultural Region" style="background-image: url('https://placeholder.pics/svg/300')"></div>
<div class="absolute inset-0 flex items-center justify-center bg-primary/10">
<div class="bg-surface-container-lowest/90 backdrop-blur-md px-6 py-3 rounded-full flex items-center gap-3 border border-outline-variant/20 shadow-lg">
<span class="material-symbols-outlined text-primary" data-icon="explore">explore</span>
<span class="text-sm font-bold text-primary">يتم تحديد أقرب الأسواق تلقائياً</span>
</div>
</div>
</div>
</form>
</div>
</div>
</main>
<!-- Bottom Navigation Shell (Shared Component Blueprint) -->
<footer class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pb-8 pt-4 bg-[#fbf9f4]/80 dark:bg-stone-950/80 backdrop-blur-md shadow-[0px_-12px_32px_rgba(27,28,25,0.04)] rounded-t-[1.5rem]">
<!-- Back Button (Inactive) -->
<button class="flex flex-col items-center justify-center text-[#42493e] dark:text-[#c2c9bb] px-6 py-2 hover:text-[#154212] dark:hover:text-[#c8f17a] transition-colors active:scale-95">
<span class="material-symbols-outlined mb-1" data-icon="arrow_back">arrow_back</span>
<span class="font-be-vietnam-pro text-xs font-medium uppercase tracking-wider">Back</span>
</button>
<!-- Progress Indicator (Active Representation) -->
<div class="flex flex-col items-center justify-center bg-[#2d5a27] text-white rounded-[1.5rem] px-8 py-3 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined mb-1" data-icon="horizontal_rule">horizontal_rule</span>
<span class="font-be-vietnam-pro text-xs font-bold uppercase tracking-wider">Step Progress</span>
</div>
<!-- Next Button (Inactive as Action Link) -->
<button class="flex flex-col items-center justify-center text-[#42493e] dark:text-[#c2c9bb] px-6 py-2 hover:text-[#154212] dark:hover:text-[#c8f17a] transition-colors active:scale-95">
<span class="material-symbols-outlined mb-1" data-icon="arrow_forward">arrow_forward</span>
<span class="font-be-vietnam-pro text-xs font-medium uppercase tracking-wider">Next</span>
</button>
</footer>
<!-- Invisible spacer for bottom nav -->
<div class="h-32"></div>
</body></html>
